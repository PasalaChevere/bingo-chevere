'use strict';
// ═══════════════════════════════════════════════════════════════════════
// FIRESTORE REST
// ═══════════════════════════════════════════════════════════════════════
const FB_KEY='AIzaSyCOYkiv5PZGNzkvzTYsuJRxffzk2whOHhg';
const FB='https://firestore.googleapis.com/v1/projects/bingo-pasalachevere/databases/(default)/documents';

function fv(v){
  if(!v)return null;
  if(v.stringValue!==undefined)return v.stringValue;
  if(v.integerValue!==undefined)return Number(v.integerValue);
  if(v.doubleValue!==undefined)return Number(v.doubleValue);
  if(v.booleanValue!==undefined)return v.booleanValue;
  if(v.nullValue!==undefined)return null;
  if(v.arrayValue)return(v.arrayValue.values||[]).map(fv);
  if(v.mapValue)return fo(v.mapValue.fields||{});
  return null;
}
function fo(f){const o={};for(const k in f)o[k]=fv(f[k]);return o;}
function tv(v){
  if(v===null||v===undefined)return{nullValue:null};
  if(typeof v==='boolean')return{booleanValue:v};
  if(typeof v==='number')return Number.isInteger(v)?{integerValue:String(v)}:{doubleValue:v};
  if(typeof v==='string')return{stringValue:v};
  if(Array.isArray(v))return{arrayValue:{values:v.length?v.map(tv):[]},_keepEmpty:true};
  if(typeof v==='object'){const fields={};for(const k in v)if(v[k]!==undefined)fields[k]=tv(v[k]);return{mapValue:{fields}};}
  return{stringValue:String(v)};
}
function tf(obj){const f={};for(const k in obj)if(obj[k]!==undefined)f[k]=tv(obj[k]);return f;}
function pd(doc){return{id:doc.name.split('/').pop(),...fo(doc.fields||{})};}

async function fsGet(col){
  const r=await fetch(`${FB}/${col}?key=${FB_KEY}&pageSize=100`);
  if(!r.ok)throw new Error(await r.text());
  const d=await r.json();
  return(d.documents||[]).map(pd);
}
async function fsQuery(col,field,val){
  const body={structuredQuery:{from:[{collectionId:col}],
    where:{fieldFilter:{field:{fieldPath:field},op:'EQUAL',value:tv(val)}}}};
  const r=await fetch(`${FB}:runQuery?key=${FB_KEY}`,
    {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok)throw new Error(await r.text());
  const d=await r.json();
  return d.filter(x=>x.document).map(x=>pd(x.document));
}
async function fsPatch(col,id,obj){
  const{id:_,...data}=obj;
  const r=await fetch(`${FB}/${col}/${id}?key=${FB_KEY}`,
    {method:'PATCH',headers:{'Content-Type':'application/json'},
     body:JSON.stringify({fields:tf(data)})});
  if(!r.ok)throw new Error(await r.text());
  return pd(await r.json());
}
async function fsAdd(col,obj){
  const r=await fetch(`${FB}/${col}?key=${FB_KEY}`,
    {method:'POST',headers:{'Content-Type':'application/json'},
     body:JSON.stringify({fields:tf(obj)})});
  if(!r.ok)throw new Error(await r.text());
  return pd(await r.json());
}
async function fsDel(col,id){
  await fetch(`${FB}/${col}/${id}?key=${FB_KEY}`,{method:'DELETE'});
}

// ═══════════════════════════════════════════════════════════════════════
// CACHE + DB API
// ═══════════════════════════════════════════════════════════════════════
const DB={cos:null,regs:{}};

async function dbGetCos(){
  if(DB.cos)return DB.cos;
  const cos=await fsGet('companies');
  cos.sort((a,b)=>(a.ts||0)-(b.ts||0));
  DB.cos=cos; return cos;
}
function dbUpdateCo(co){
  if(!DB.cos)DB.cos=[];
  const i=DB.cos.findIndex(c=>c.id===co.id);
  if(i!==-1)DB.cos[i]=co;else DB.cos.push(co);
  fsPatch('companies',co.id,co).catch(e=>console.error('saveCo:',e));
}
function dbAddCo(co){
  if(!DB.cos)DB.cos=[];
  DB.cos.push(co);
  fsPatch('companies',co.id,co).catch(e=>console.error('addCo:',e));
}
function dbDeleteCo(id){
  if(DB.cos)DB.cos=DB.cos.filter(c=>c.id!==id);
  delete DB.regs[id];
  fsDel('companies',id).catch(e=>console.error('delCo:',e));
  fsQuery('registrations','coId',id)
    .then(regs=>Promise.all(regs.map(r=>fsDel('registrations',r.id))))
    .catch(e=>console.error('delRegs:',e));
}
async function dbGetRegs(coId){
  if(DB.regs[coId])return DB.regs[coId];
  const regs=await fsQuery('registrations','coId',coId);
  regs.sort((a,b)=>(a.ts||'').localeCompare(b.ts||''));
  DB.regs[coId]=regs; return regs;
}
function dbAddReg(coId,reg){
  if(!DB.regs[coId])DB.regs[coId]=[];
  DB.regs[coId].push(reg);
  fsAdd('registrations',{coId,...reg}).catch(e=>console.error('addReg:',e));
  // increment counter
  const co=DB.cos&&DB.cos.find(c=>c.id===coId);
  if(co){co.counter=(co.counter||0)+reg.codes.length;dbUpdateCo(co);}
}
function dbDeleteRegs(coId){
  DB.regs[coId]=[];
  fsQuery('registrations','coId',coId)
    .then(regs=>Promise.all(regs.map(r=>fsDel('registrations',r.id))))
    .catch(e=>console.error('delRegs:',e));
}
function dbNextCode(coId){
  const co=DB.cos&&DB.cos.find(c=>c.id===coId);
  if(!co)return'00001';
  co.counter=(co.counter||0)+1;
  return String(co.counter).padStart(5,'0');
}

// ═══════════════════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════════════════
const PASS='chevere2025';
const COLS=['B','I','N','G','O'];
const RANGES={B:[1,15],I:[16,30],N:[31,45],G:[46,60],O:[61,75]};
const GDFL={gridLeft:5.8,gridTop:52.5,cellW:18.1,cellH:9.2,numFontPct:3.2,numColor:'#1A1A2E',ovalX:49.5,ovalY:29.5,ovalFontPct:2.1,ovalColor:'#333333'};
const BDEF={brandBg:'#1E2D6B',brandAccent:'#F5A623',brandLogo:null};

// ═══════════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════════
function slugify(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmt(iso){if(!iso)return'—';try{return new Date(iso).toLocaleString('es-PE',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});}catch{return iso;}}
function expired(co){return co.deadline&&new Date()>new Date(co.deadline);}
function isClosed(co,regs){const used=(regs||[]).reduce((s,r)=>s+(r.codes?.length||0),0);return!co.isActive||expired(co)||used>=co.maxTotal;}
function mkCo(name){return{id:'co'+Date.now()+Math.random().toString(36).slice(2,5),name,slug:slugify(name),isActive:false,maxTotal:200,maxPer:1,eventDate:'',deadline:'',template:null,counter:0,ts:Date.now(),...GDFL,...BDEF};}
function genCard(){const c={};COLS.forEach(col=>{const[lo,hi]=RANGES[col];const p=Array.from({length:hi-lo+1},(_,i)=>i+lo);c[col]=[];while(c[col].length<5){const i=Math.floor(Math.random()*p.length);c[col].push(p.splice(i,1)[0]);}});c.N[2]=null;return c;}
function cardNums(card){return COLS.map(c=>c+':'+card[c].map(n=>n===null?'★':n).join(',')).join(' | ');}
function usedCount(regs){return(regs||[]).reduce((s,r)=>s+(r.codes?.length||0),0);}
function normName(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim();}
function findDupes(regs){const d=new Set();for(let i=0;i<regs.length;i++){const ni=normName(regs[i].apellidos+' '+regs[i].nombre);for(let j=i+1;j<regs.length;j++){const nj=normName(regs[j].apellidos+' '+regs[j].nombre);if(ni===nj||ni.includes(nj)||nj.includes(ni)){d.add(i);d.add(j);}}}return d;}
function dlImg(u,n){const a=document.createElement('a');a.href=u;a.download=n+'.png';document.body.appendChild(a);a.click();document.body.removeChild(a);}

async function dlAll(items,name){
  if(!items.length)return;
  if(items.length===1){dlImg(items[0].dataUrl,items[0].filename);return;}
  const cv=document.createElement('canvas');
  const imgs=await Promise.all(items.map(it=>new Promise(res=>{const i=new Image();i.onload=()=>res(i);i.src=it.dataUrl;})));
  const W=imgs[0].width,H=imgs[0].height,cols=Math.min(4,imgs.length),rows=Math.ceil(imgs.length/cols),GAP=16;
  cv.width=cols*W+(cols+1)*GAP;cv.height=rows*H+(rows+1)*GAP;
  const ctx=cv.getContext('2d');ctx.fillStyle='#f0f0f0';ctx.fillRect(0,0,cv.width,cv.height);
  imgs.forEach((img,idx)=>{const c=idx%cols,r=Math.floor(idx/cols);ctx.drawImage(img,GAP+c*(W+GAP),GAP+r*(H+GAP),W,H);});
  dlImg(cv.toDataURL('image/png'),name);
}

function renderCard(co,card,code,fullName){
  return new Promise(resolve=>{
    const draw=(ctx,W,H)=>{
      const GL=W*co.gridLeft/100,GT=H*co.gridTop/100,CW=W*co.cellW/100,CH=H*co.cellH/100;
      const fs=Math.round(W*co.numFontPct/100);
      ctx.textAlign='center';ctx.textBaseline='middle';
      COLS.forEach((col,ci)=>{card[col].forEach((num,ri)=>{
        const cx=GL+ci*CW+CW/2,cy=GT+ri*CH+CH/2;
        if(num!==null){ctx.font='900 '+fs+'px Arial Black,Arial';ctx.fillStyle=co.numColor||'#1A1A2E';ctx.fillText(String(num),cx,cy);}
      });});
      const ox=W*co.ovalX/100,oy=H*co.ovalY/100,ofs=Math.round(W*co.ovalFontPct/100);
      ctx.font='800 '+ofs+'px Arial,sans-serif';ctx.fillStyle=co.ovalColor||'#333';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(code+'  ·  '+fullName,ox,oy);
    };
    const cv=document.createElement('canvas');
    if(co.template){
      const img=new Image();
      img.onload=()=>{cv.width=img.width;cv.height=img.height;const ctx=cv.getContext('2d');ctx.drawImage(img,0,0);draw(ctx,img.width,img.height);resolve(cv.toDataURL('image/png'));};
      img.onerror=()=>resolve(null);img.src=co.template;
    }else{
      cv.width=600;cv.height=760;const ctx=cv.getContext('2d'),W=600,H=760;
      ctx.fillStyle=co.brandAccent||'#F5A623';ctx.fillRect(0,0,W,H);
      ctx.fillStyle='rgba(0,0,0,.15)';ctx.fillRect(0,0,W,110);
      ctx.fillStyle='#fff';ctx.font="bold 28px 'Fredoka One',cursive";ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(co.name||'Bingo',W/2,55);
      ctx.fillStyle='rgba(255,255,255,.88)';ctx.beginPath();ctx.ellipse(W/2,128,165,20,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.font='bold 48px Arial Black';ctx.textBaseline='middle';
      COLS.forEach((l,i)=>ctx.fillText(l,42+i*105+52,192));
      ctx.fillStyle='#fff';ctx.fillRect(14,216,572,496);ctx.strokeStyle='#222';ctx.lineWidth=2;
      for(let r=0;r<=5;r++){ctx.beginPath();ctx.moveTo(14,216+r*99);ctx.lineTo(586,216+r*99);ctx.stroke();}
      for(let c=0;c<=5;c++){ctx.beginPath();ctx.moveTo(14+c*114,216);ctx.lineTo(14+c*114,712);ctx.stroke();}
      ctx.fillStyle='rgba(0,0,0,.8)';ctx.fillRect(14+2*114,216+2*99,114,99);
      draw(ctx,W,H);resolve(cv.toDataURL('image/png'));
    }
  });
}

  ${FOOTER}
</div>`;

  app.querySelector('#go-adm').onclick=()=>{APP.page='login';render();};
  const inp=app.querySelector('#slug-inp'),err=app.querySelector('#slug-err');
  const go=async()=>{
    const v=inp.value.trim().replace(/.*#evento\//,'');
    if(!v){err.textContent='Ingresa un código';err.style.display='block';return;}
    const cos=await dbGetCos().catch(()=>[]);
    const co=cos.find(c=>c.slug===v||c.slug===slugify(v));
    if(!co){err.textContent='Evento no encontrado.';err.style.display='block';return;}
    nav('#evento/'+co.slug);

async function renderAdminList(){
  adminShell('Panel de empresas','',null,'<div style="padding:40px;text-align:center">⏳ Cargando...</div>');
  let cos=[];
  try{cos=await dbGetCos();}
  catch(e){app.querySelector('#adm-body').innerHTML='<div class="card" style="color:red;padding:40px">Error: '+e.message+'</div>';return;}
  
  const body=app.querySelector('#adm-body');
  body.innerHTML=`
<div style="display:grid;gap:1rem">
  <div class="flex ai-c jb">
    <h3 style="color:var(--nv);font-size:22px">Empresas / Eventos (${cos.length})</h3>
    <button id="btn-new" class="btn p">+ Nueva empresa</button>
  </div>
  <div id="new-form"></div>
  <div class="card fi" style="padding:10px 14px;background:var(--ye-bg);border-color:var(--ye-bd)">
    <p style="font-size:13px;color:var(--ye-tx)">💡 Haz clic en el <strong>nombre</strong> para ver cartillas. Usa <strong>Editar</strong> para configurar.</p>
  </div>
  ${cos.length===0?`<div class="card" style="text-align:center;padding:56px">
    <div style="font-size:48px;margin-bottom:12px">🏢</div>
    <h3 style="color:var(--nv);margin-bottom:8px">Sin empresas todavía</h3>
    <p class="hint">Crea la primera con el botón de arriba</p>
  </div>`:`<div style="overflow-x:auto"><table>
    <thead><tr><th>Empresa</th><th>URL</th><th>Estado</th><th style="text-align:center">Cartillas</th><th>Fecha</th><th>Cierre</th><th>Acciones</th></tr></thead>
    <tbody>${cos.map(co=>{
      const used=co.counter||0;
      const pct=Math.min(100,Math.round(used/(co.maxTotal||200)*100));
      const exp=expired(co);
      return`<tr>
        <td><span class="name-link" data-id="${co.id}">${esc(co.name)}</span></td>
        <td><code style="background:var(--bg1);padding:2px 6px;border-radius:4px;font-size:11px">evento/${esc(co.slug)}</code></td>
        <td><span class="badge ${co.isActive?'ok':'no'}">${co.isActive?'🟢 Activo':'⏸️ Pausado'}</span>${exp?'<span class="badge no" style="margin-left:4px">⏱️ Vencido</span>':''}</td>
        <td style="text-align:center;min-width:90px"><div style="font-size:11px;color:var(--tx2);margin-bottom:3px">${used}/${co.maxTotal||200}</div><div class="prog-wrap"><div class="prog-bar" style="width:${pct}%"></div></div></td>
        <td style="font-size:12px;color:var(--tx1)">${fmt(co.eventDate)}</td>
        <td style="font-size:12px;color:${exp?'var(--no-tx)':'var(--tx1)'}">${fmt(co.deadline)}</td>
        <td><div class="flex gap4">
          <button class="btn sm p" data-edit="${co.id}">✏️ Editar</button>
          <button class="btn sm" data-url="${esc(co.slug)}">🔗 URL</button>
          <button class="btn sm danger" data-del="${co.id}" data-name="${esc(co.name)}">✕</button>
        </div></td>
      </tr>`;}).join('')}</tbody>
  </table></div>`}
</div>`;

  // Nueva empresa
  body.querySelector('#btn-new').onclick=()=>{
    const form=body.querySelector('#new-form');
    if(form.innerHTML)return form.innerHTML='';
    form.innerHTML=`<div class="card fi" style="border:1.5px solid var(--or);background:var(--or-lt)">
      <h4 style="color:var(--nv);font-size:17px;margin-bottom:14px">Nueva empresa / evento</h4>
      <div class="fld"><label class="lbl">Nombre</label>
        <input id="new-name" class="inp" placeholder="Ej: Tottus – Bingo Navidad 2025"/>
        <p id="new-err" class="err-msg" style="display:none"></p></div>
      <div class="flex gap8">
        <button id="new-ok" class="btn p">Crear empresa</button>
        <button id="new-cancel" class="btn ghost">Cancelar</button>
      </div></div>`;
    const inp=form.querySelector('#new-name'),err=form.querySelector('#new-err');
    inp.focus();
    form.querySelector('#new-ok').onclick=()=>{
      const name=inp.value.trim();
      if(!name){err.textContent='Ingresa un nombre';err.style.display='block';return;}
      const cos=DB.cos||[];
      if(cos.some(c=>c.slug===slugify(name))){err.textContent='Ya existe una empresa con ese nombre';err.style.display='block';return;}
      const co=mkCo(name);dbAddCo(co);
      form.innerHTML='';renderAdminList();
    };
    form.querySelector('#new-cancel').onclick=()=>form.innerHTML='';
    inp.onkeydown=e=>{if(e.key==='Enter')form.querySelector('#new-ok').click();if(e.key==='Escape')form.querySelector('#new-cancel').click();};
  };

  // Nombre → readonly
  body.querySelectorAll('.name-link').forEach(b=>b.onclick=async()=>{
    const co=(DB.cos||[]).find(c=>c.id===b.dataset.id);
    if(!co)return;
    APP.roCo=co;
    const regs=await dbGetRegs(co.id).catch(()=>[]);
    APP.roRegs=regs;
    APP.page='admin-ro';render();
  });

  // Editar
  body.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>{
    const co=(DB.cos||[]).find(c=>c.id===b.dataset.edit);
    if(!co){alert('Empresa no encontrada. Recarga la página.');return;}
    APP.editCo=co;APP.adminTab='cfg';APP.page='admin-co';render();
  });

  // URL
  body.querySelectorAll('[data-url]').forEach(b=>b.onclick=()=>{
    const url=location.origin+location.pathname+'#evento/'+b.dataset.url;
    navigator.clipboard?.writeText(url).then(()=>alert('✅ URL copiada:\n\n'+url)).catch(()=>prompt('Copia esta URL:',url));
  });

  // Eliminar
  body.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{
    if(!confirm('¿Eliminar "'+b.dataset.name+'" y todos sus registros?'))return;
    b.textContent='...';b.disabled=true;
    dbDeleteCo(b.dataset.del);
    renderAdminList();
  });
}

  </div>
</div>`;
    const drawOv=()=>{
      const cv=el.querySelector('#gcv');if(!cv||!co.template)return;
      const img=new Image();img.onload=()=>{
        const mW=cv.parentElement.clientWidth-42,sc=mW/img.width;
        cv.width=mW;cv.height=Math.round(img.height*sc);
        const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
        ctx.drawImage(img,0,0,W,H);
        const GL=W*co.gridLeft/100,GT=H*co.gridTop/100,CW=W*co.cellW/100,CH=H*co.cellH/100;
        ctx.fillStyle='rgba(245,166,35,.18)';ctx.strokeStyle='rgba(245,166,35,.88)';ctx.lineWidth=1.5;
        for(let r=0;r<5;r++)for(let c=0;c<5;c++){ctx.fillRect(GL+c*CW,GT+r*CH,CW,CH);ctx.strokeRect(GL+c*CW,GT+r*CH,CW,CH);}

        ctx.strokeStyle='rgba(245,166,35,.9)';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);

    ${co.brandLogo?`<img src="${co.brandLogo}" style="height:32px;object-fit:contain"/>`:
      `<span style="font-family:'Fredoka One';font-size:17px;color:#fff">${esc(co.name)}</span>`}
    <a href="#" onclick="nav('#');return false;" style="font-size:13px;color:rgba(255,255,255,.4);font-weight:700">← Inicio</a>
  </div>
  <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:32px 16px">
    <div style="width:100%;max-width:440px">
      <div style="text-align:center;margin-bottom:24px" class="fi">
        <div style="font-size:52px;margin-bottom:10px">🎱</div>
        <h1 style="color:#fff;font-size:30px;line-height:1.15">${esc(co.name)}</h1>
        ${co.eventDate?`<div style="color:rgba(255,255,255,.6);font-size:14px;margin-top:6px">📅 ${fmt(co.eventDate)}</div>`:''}
        ${co.deadline&&!expired(co)?`<div style="color:rgba(255,255,255,.5);font-size:13px;margin-top:4px">⏱️ Cierra: ${fmt(co.deadline)}</div>`:''}
        <p style="color:rgba(255,255,255,.55);font-size:15px;margin-top:8px">Regístrate y recibe ${(co.maxPer||1)>1?`tus <strong>${co.maxPer} cartillas</strong>`:'tu <strong>cartilla</strong>'} al instante</p>
      </div>
      ${closed?`<div class="card fi" style="text-align:center;padding:48px 24px">
          <div style="font-size:44px;margin-bottom:12px">${expired(co)?'⏰':'😔'}</div>
          <h3 style="color:var(--nv);font-size:20px;margin-bottom:8px">${expired(co)?'El registro ha cerrado':'No disponible'}</h3>
          <p class="hint">${expired(co)?'La fecha límite ya pasó.':'Consulta con el organizador.'}</p>
        </div>`
      :`<div class="card fi">
          <div class="fld"><label class="lbl">Apellidos completos</label>
            <input id="f-ap" class="inp${e.apellidos?' err':''}" value="${esc(f.apellidos)}" placeholder="Ej: García López"/>
            ${e.apellidos?`<p class="err-msg">⚠️ ${esc(e.apellidos)}</p>`:''}</div>
          <div class="fld"><label class="lbl">Nombre(s)</label>
            <input id="f-nb" class="inp${e.nombre?' err':''}" value="${esc(f.nombre)}" placeholder="Ej: María"/>
            ${e.nombre?`<p class="err-msg">⚠️ ${esc(e.nombre)}</p>`:''}</div>
          <div class="fld"><label class="lbl">DNI</label>
            <input id="f-dn" class="inp${e.dni?' err':''}" value="${esc(f.dni)}" placeholder="8 dígitos" maxlength="8" inputmode="numeric"/>
            ${e.dni?`<p class="err-msg">⚠️ ${esc(e.dni)}</p>`:''}</div>
          <button id="f-sub" class="btn w100 mt4" style="background:${acc};color:#fff;border-color:${acc};font-size:17px;padding:14px;border-radius:var(--r)" ${APP.pLoading?'disabled':''}>
            ${APP.pLoading?'⏳ Generando tu cartilla...':'🎲 ¡Obtener mi cartilla!'}
          </button>
        </div>`}
    </div>
  </div>
  ${FOOTER}
</div>`;

  if(closed)return;
  const bind=(id,key)=>{const inp=app.querySelector('#'+id);if(!inp)return;inp.oninput=ev=>{APP.pForm[key]=ev.target.value;delete APP.pErr[key];};inp.onkeydown=ev=>{if(ev.key==='Enter')submit();};};
  bind('f-ap','apellidos');bind('f-nb','nombre');bind('f-dn','dni');
  app.querySelector('#f-sub').onclick=submit;
  setTimeout(()=>app.querySelector('#f-ap')?.focus(),80);

  async function submit(){
    const f=APP.pForm;const errs={};
    if(!f.apellidos.trim())errs.apellidos='Ingresa tus apellidos';
    if(!f.nombre.trim())errs.nombre='Ingresa tu nombre';
    if(!/^\d{8}$/.test(f.dni.trim()))errs.dni='El DNI debe tener exactamente 8 dígitos';
    if(Object.keys(errs).length){APP.pErr=errs;renderEvento();return;}
    APP.pLoading=true;APP.pErr={};renderEvento();
    try{
      const freshRegs=await dbGetRegs(co.id);
      if(freshRegs.some(r=>r.dni===f.dni.trim())){APP.pErr={dni:'Este DNI ya fue registrado'};APP.pLoading=false;renderEvento();return;}
      if(isClosed(co,freshRegs)){APP.pErr={dni:'Capacidad máxima alcanzada'};APP.pLoading=false;renderEvento();return;}
      const cards=[],codes=[],imgs=[],fullName=f.apellidos.trim().toUpperCase()+' '+f.nombre.trim();
      for(let i=0;i<(co.maxPer||1);i++){
        if(usedCount(freshRegs)+i>=(co.maxTotal||200))break;
        const card=genCard(),code=dbNextCode(co.id);
        const img=await renderCard(co,card,code,fullName);
        cards.push(card);codes.push(code);imgs.push(img);
      }
      const reg={apellidos:f.apellidos.trim(),nombre:f.nombre.trim(),dni:f.dni.trim(),codes,cards,ts:new Date().toISOString()};
      dbAddReg(co.id,reg);
      APP.pResult={codes,cards,imgs,nombre:f.nombre.trim(),apellidos:f.apellidos.trim()};
      APP.pLoading=false;APP.page='done';render();
    }catch(e){APP.pLoading=false;app.querySelector('#f-sub').disabled=false;alert('Error: '+e.message);}
  }
}

// BOOT
// ═══════════════════════════════════════════════════════════════════════
async function boot(){
  const h=location.hash.replace(/^#\/?/,'');
  if(h.startsWith('evento/')){
    const slug=h.split('/')[1];
    setPage('loading');
    try{
      const cos=await dbGetCos();
      const co=cos.find(c=>c.slug===slug);
      if(!co){app.innerHTML='<div style="min-height:100vh;background:var(--nv);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;padding:24px;text-align:center"><div style="font-size:56px">😵</div><h2 style="color:#fff">Evento no encontrado</h2><p style="color:rgba(255,255,255,.5)">Verifica el enlace.</p><button class="btn p" onclick="nav(\'#\')">← Volver</button></div>';return;}
      const regs=await dbGetRegs(co.id);
      APP.pCo=co;APP.pRegs=regs;
      if(APP.pResult&&APP.pResult._coId===co.id)setPage('done');
      else{APP.pResult=null;setPage('evento');}
    }catch(e){app.innerHTML='<div style="min-height:100vh;background:var(--nv);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;padding:24px;text-align:center"><div style="font-size:48px">⚠️</div><div style="color:#fff;font-size:16px">Error de conexión: '+e.message+'</div><button class="btn p" onclick="location.reload()">🔄 Reintentar</button></div>';}
  } else if(h==='admin'||h.startsWith('admin')){
    if(APP.auth){setPage('admin-list');renderAdminList();}
    else setPage('login');
  } else {
    setPage('home');
  }
}
