<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bingo Virtual · Pásala Chévere</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --or:#F5A623;--ork:#d48d18;--or-lt:#fffbf0;
  --nv:#1E2D6B;
  --bg0:#fff;--bg1:#f7f5f2;--bg2:#ede9e3;
  --tx0:#1a1a1a;--tx1:#555;--tx2:#999;
  --bd:rgba(0,0,0,.09);--bd2:rgba(0,0,0,.18);
  --r:8px;--rl:14px;
  --ok-bg:#ecfdf5;--ok-tx:#065f46;--ok-bd:rgba(6,95,70,.25);
  --no-bg:#fef2f2;--no-tx:#991b1b;--no-bd:rgba(153,27,27,.25);
  --ye-bg:#fefce8;--ye-tx:#854d0e;--ye-bd:rgba(133,77,14,.25);
}
body{font-family:'Nunito',sans-serif;background:var(--bg1);color:var(--tx0);min-height:100vh;line-height:1.5;font-size:15px}
h1,h2,h3,h4{font-family:'Fredoka One',sans-serif;font-weight:400}
.btn{border:0.5px solid var(--bd2);border-radius:var(--r);padding:9px 18px;background:var(--bg0);color:var(--tx0);font:700 14px 'Nunito',sans-serif;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover:not(:disabled){background:var(--bg1)} .btn:active:not(:disabled){transform:scale(.98)}
.btn:disabled{opacity:.45;cursor:default}
.p{background:var(--or);color:#fff;border-color:var(--ork)} .p:hover:not(:disabled){background:var(--ork)}
.danger{background:var(--no-bg);color:var(--no-tx);border-color:var(--no-bd)}
.ghost{color:var(--tx1);background:transparent;border-color:transparent}
.sm{padding:6px 12px;font-size:13px}
.inp{width:100%;padding:9px 13px;border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--bg0);color:var(--tx0);font:600 14px 'Nunito',sans-serif;outline:none;transition:.15s}
.inp:focus{border-color:var(--or);box-shadow:0 0 0 3px rgba(255,107,53,.1)}
.inp.err{border-color:#ef4444;box-shadow:0 0 0 3px rgba(239,68,68,.1)}
select.inp{cursor:pointer} input[type=range]{width:100%;accent-color:var(--or);cursor:pointer}
input[type=color]{width:44px;height:36px;border-radius:var(--r);border:0.5px solid var(--bd2);cursor:pointer;padding:2px;background:var(--bg0)}
.card{background:var(--bg0);border-radius:var(--rl);border:0.5px solid var(--bd);padding:1.25rem}
.tabs{display:flex;border-bottom:0.5px solid var(--bd2);background:var(--bg0);overflow-x:auto;padding:0 20px}
.tab{padding:11px 15px;border:none;border-bottom:2.5px solid transparent;background:none;color:var(--tx1);font:700 13px 'Nunito',sans-serif;cursor:pointer;white-space:nowrap;transition:.15s}
.tab:hover{color:var(--tx0)} .tab.on{color:var(--or);border-bottom-color:var(--or)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:800;white-space:nowrap}
.ok{background:var(--ok-bg);color:var(--ok-tx)} .no{background:var(--no-bg);color:var(--no-tx)} .ye{background:var(--ye-bg);color:var(--ye-tx)}
.err-msg{color:#dc2626;font-size:12px;font-weight:700;margin-top:3px}
.hint{color:var(--tx2);font-size:13px}
.lbl{color:var(--tx1);font-size:11px;font-weight:800;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.fld{margin-bottom:14px}
.w100{width:100%} .flex{display:flex} .ai-c{align-items:center} .jb{justify-content:space-between} .wrap{flex-wrap:wrap}
.gap4{gap:4px} .gap8{gap:8px} .gap12{gap:12px} .gap16{gap:16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.mt4{margin-top:4px} .mt8{margin-top:8px} .mt12{margin-top:12px} .mt16{margin-top:16px}
.mb8{margin-bottom:8px} .mb12{margin-bottom:12px} .mb16{margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;font-size:10px;color:var(--tx1);font-weight:800;text-transform:uppercase;letter-spacing:.5px;border-bottom:0.5px solid var(--bd2);white-space:nowrap}
td{padding:8px 10px;border-bottom:0.5px solid var(--bd);vertical-align:middle}
tr:last-child td{border-bottom:none} tr:hover td{background:var(--bg1)}
.upload-zone{border:1.5px dashed var(--bd2);border-radius:var(--rl);padding:24px 16px;text-align:center;cursor:pointer;transition:.15s;background:var(--bg1)}
.upload-zone:hover{border-color:var(--or);background:var(--or-lt)}
.hdr{background:var(--nv);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.cp{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.pw{padding:24px;max-width:1020px;margin:0 auto}
.prog-wrap{background:var(--bg2);border-radius:99px;height:6px;overflow:hidden}
.prog-bar{height:100%;border-radius:99px;background:var(--or);transition:.3s}
.stripe{padding:12px 16px;border-radius:var(--r);border:0.5px solid;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}} .fi{animation:fi .3s ease forwards}
@keyframes pp{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}} .pp{animation:pp .3s ease forwards}
.name-link{cursor:pointer;color:var(--or);text-decoration:underline;text-underline-offset:3px;font-weight:800}
.name-link:hover{opacity:.75}
@media(max-width:700px){.g2{grid-template-columns:1fr} .pw{padding:14px} .hdr{padding:12px 16px}}
</style>
</head>

<script>
window.onerror=function(msg,src,line){
  const r=document.getElementById('root');
  if(r&&!r.innerHTML.trim())
    r.innerHTML='<div style="min-height:100vh;background:#1E2D6B;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;padding:24px;text-align:center"><div style="font-size:40px">⚠️</div><div style="color:#fff;font-size:15px;font-weight:700">'+msg+'</div><button onclick="location.reload()" style="background:#F5A623;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-weight:700;cursor:pointer">🔄 Reintentar</button></div>';
  return false;
};
</script>

  if(typeof v==='number')return Number.isInteger(v)?{integerValue:String(v)}:{doubleValue:v};
  if(typeof v==='string')return{stringValue:v};
  if(Array.isArray(v))return{arrayValue:{values:v.map(toVal)}};
  if(typeof v==='object')return{mapValue:{fields:toFields(v)}};
  return{stringValue:String(v)};
}
function toFields(obj){const f={};for(const k in obj)if(obj[k]!==undefined)f[k]=toVal(obj[k]);return f;}
function parseDoc(doc){return{id:doc.name.split('/').pop(),...fsObj(doc.fields||{})};}

async function fbGet(col){
  const r=await fetch(`${FB_URL}/${col}?key=${FB_KEY}`);
  if(!r.ok)throw new Error('fbGet '+col+': '+r.status);
  const d=await r.json();
  return(d.documents||[]).map(parseDoc);
}
async function fbQuery(col,field,val){
  const body={structuredQuery:{from:[{collectionId:col}],
    where:{fieldFilter:{field:{fieldPath:field},op:'EQUAL',value:toVal(val)}}}};
  const r=await fetch(`${FB_URL}:runQuery?key=${FB_KEY}`,
    {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok)throw new Error('fbQuery: '+r.status);
  const d=await r.json();
  return d.filter(x=>x.document).map(x=>parseDoc(x.document));
}
async function fbSet(col,id,obj){
  const{id:_,...data}=obj;
  const r=await fetch(`${FB_URL}/${col}/${id}?key=${FB_KEY}`,
    {method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields:toFields(data)})});
  if(!r.ok)throw new Error('fbSet: '+r.status+' '+await r.text());
  return r.json();
}
async function fbAdd(col,obj){
  const r=await fetch(`${FB_URL}/${col}?key=${FB_KEY}`,
    {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields:toFields(obj)})});
  if(!r.ok)throw new Error('fbAdd: '+r.status+' '+await r.text());
  return r.json();
}
async function fbDel(col,id){
  const r=await fetch(`${FB_URL}/${col}/${id}?key=${FB_KEY}`,{method:'DELETE'});
  if(!r.ok&&r.status!==404)throw new Error('fbDel: '+r.status);
}

async function nextCode(coId){

  const counter=(co.counter||0)+1;
  await fbSet('companies',coId,{...co,counter});
  return String(counter).padStart(5,'0');
}

function usedCards(regs){return(regs||[]).reduce((s,r)=>s+(r.codes?.length||0),0);}

function slugify(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmt(iso){if(!iso)return'—';try{return new Date(iso).toLocaleString('es-PE',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});}catch{return iso;}}
function expired(co){return co.deadline&&new Date()>new Date(co.deadline);}
function isClosed(co){return !co.isActive||expired(co)||usedCards(co.id)>=co.maxTotal;}

}

// -- Duplicate detection
function normName(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim();}
function findDupes(regs){
  var d=new Set();
  for(var i=0;i<regs.length;i++){
    var ni=normName(regs[i].apellidos+' '+regs[i].nombre);
    for(var j=i+1;j<regs.length;j++){
      var nj=normName(regs[j].apellidos+' '+regs[j].nombre);
      if(ni===nj||ni.includes(nj)||nj.includes(ni)){d.add(i);d.add(j);}
    }
  }
  return d;
}
function dupeBanner(regs){
  var d=findDupes(regs);
  if(!d.size)return '';
  return '<div style="background:#fef3cd;border:1px solid #f0c040;border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:10px;margin-bottom:14px">'+'<span style="font-size:20px">&#9888;</span>'+'<div><div style="font-weight:800;color:#7a4f00;font-size:14px">'+d.size+' nombre'+(d.size>1?'s duplicados detectados':' duplicado detectado')+'</div>'+'<div style="font-size:12px;color:#9a6500;margin-top:2px">Revisa las filas marcadas en amarillo y verifica con la empresa si son personas distintas o registros repetidos.</div></div></div>';
}

// ── Render Card ──────────────────────────────────────────────────────────────
function renderCard(co,card,code,fullName){
  return new Promise(resolve=>{
    const draw=(ctx,W,H)=>{
      const GL=W*co.gridLeft/100,GT=H*co.gridTop/100,CW=W*co.cellW/100,CH=H*co.cellH/100;
      const fs=Math.round(W*co.numFontPct/100);
      ctx.textAlign='center';ctx.textBaseline='middle';
      COLS.forEach((col,ci)=>{card[col].forEach((num,ri)=>{
        const cx=GL+ci*CW+CW/2,cy=GT+ri*CH+CH/2;
        if(num===null){/* celda central libre — sin texto */}
        else{ctx.font='900 '+fs+'px Arial Black,Arial';ctx.fillStyle=co.numColor;ctx.fillText(String(num),cx,cy);}
      });});
      const ox=W*co.ovalX/100,oy=H*co.ovalY/100,ofs=Math.round(W*co.ovalFontPct/100);
      ctx.font='800 '+ofs+'px Arial,sans-serif';ctx.fillStyle=co.ovalColor;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(code+'  ·  '+fullName,ox,oy);
    };
    const cv=document.createElement('canvas');
    if(co.template){
      const img=new Image();
      img.onload=()=>{cv.width=img.width;cv.height=img.height;const ctx=cv.getContext('2d');ctx.drawImage(img,0,0);draw(ctx,img.width,img.height);resolve(cv.toDataURL('image/png'));};
      img.onerror=()=>resolve(null); img.src=co.template;
    } else {
      cv.width=600;cv.height=760;const ctx=cv.getContext('2d'),W=600,H=760;
      ctx.fillStyle=co.brandAccent||'#FF8C42';ctx.fillRect(0,0,W,H);
      ctx.fillStyle='rgba(0,0,0,.15)';ctx.fillRect(0,0,W,110);
      ctx.fillStyle='#fff';ctx.font="bold 28px 'Fredoka One',cursive";ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(co.name||'Bingo',W/2,55);
      ctx.fillStyle='rgba(255,255,255,.88)';ctx.beginPath();ctx.ellipse(W/2,128,165,20,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.font='bold 48px Arial Black';ctx.textBaseline='middle';
      COLS.forEach((l,i)=>ctx.fillText(l,42+i*105+52,192));
      ctx.fillStyle='#fff';ctx.fillRect(14,216,572,496);
      ctx.strokeStyle='#222';ctx.lineWidth=2;
      for(let r=0;r<=5;r++){ctx.beginPath();ctx.moveTo(14,216+r*99);ctx.lineTo(586,216+r*99);ctx.stroke();}
      for(let c=0;c<=5;c++){ctx.beginPath();ctx.moveTo(14+c*114,216);ctx.lineTo(14+c*114,712);ctx.stroke();}
      ctx.fillStyle='rgba(0,0,0,.8)';ctx.fillRect(14+2*114,216+2*99,114,99);
      draw(ctx,W,H);resolve(cv.toDataURL('image/png'));
    }
  });
}
function dlImg(u,n){
  const a=document.createElement('a');
  a.href=u;a.download=n+'.png';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}

// Crea una imagen compuesta con todas las cartillas y descarga como un solo PNG
async function dlAll(items, name){
  if(!items.length)return;
  if(items.length===1){dlImg(items[0].dataUrl,items[0].filename);return;}
  // Cargar todas las imágenes
  const imgs=await Promise.all(items.map(item=>new Promise(res=>{
    const i=new Image();i.onload=()=>res(i);i.src=item.dataUrl;
  })));
  const W=imgs[0].width;
  const H=imgs[0].height;
  const cols=Math.min(4,imgs.length);
  const rows=Math.ceil(imgs.length/cols);
  const GAP=20;
  const cv=document.createElement('canvas');
  cv.width=cols*W+(cols+1)*GAP;
  cv.height=rows*H+(rows+1)*GAP;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#f0f0f0';ctx.fillRect(0,0,cv.width,cv.height);
  imgs.forEach((img,idx)=>{
    const col=idx%cols, row=Math.floor(idx/cols);
    const x=GAP+col*(W+GAP), y=GAP+row*(H+GAP);
    ctx.drawImage(img,x,y,W,H);
  });
  dlImg(cv.toDataURL('image/png'),name);
}

function getRoute(){
  const h=location.hash.replace(/^#\/?/,'');
  if(!h||h==='/')return{p:'home'};
  if(h.startsWith('admin'))return{p:'admin'};
  if(h.startsWith('evento/')){const slug=h.split('/')[1];return{p:'evento',slug};}
  return{p:'home'};
}
function nav(hash){location.hash=hash;}
window.addEventListener('hashchange',R);

async function R(){
  const root=document.getElementById('root');
  const rt=getRoute();
  if(rt.p==='admin'){
    S.auth?viewAdmin(root):viewLogin(root);
  } else if(rt.p==='evento'){
    showLoading(root,'Cargando evento...');
    try{
      const cos=await getCos();
      const co=cos.find(c=>c.slug===rt.slug);
      if(!co){viewNotFound(root);return;}
      const regs=await getRegs(co.id);
      S.pCo=co; S.pRegs=regs;
      if(S.pResult)viewDone(root);else viewParticipant(root);
    }catch(e){
      showError(root,'Error al cargar: '+e.message);
    }
  } else {
    viewHome(root);
  }
}

      back.style.display='none';sub.textContent='Panel de empresas';viewCoList(body,renderAdmin);

}

// ══ LISTA DE EMPRESAS ═════════════════════════════════════════════════════════
async function viewCoList(el,reRender){
  el.innerHTML='<div style="padding:40px;text-align:center"><div style="font-size:32px;margin-bottom:8px">⏳</div><p class="hint">Cargando...</p></div>';
  let cos=[];
  try{cos=await getCos();}catch(e){el.innerHTML='<div style="padding:40px;text-align:center;color:red">Error: '+e.message+'</div>';return;}
  el.innerHTML=`
<div style="display:grid;gap:1rem">
  <div class="flex ai-c jb">
    <h3 style="color:var(--nv);font-size:22px">Empresas / Eventos (${cos.length})</h3>
    <button id="btn-new" class="btn p">+ Nueva empresa</button>
  </div>
  <div id="new-form"></div>
  <div class="card fi" style="padding:12px 16px;background:var(--ye-bg);border-color:var(--ye-bd)">
    <p style="font-size:13px;color:var(--ye-tx)">💡 <strong>Haz clic en el nombre</strong> de una empresa para ver sus cartillas. Usa <strong>Editar</strong> solo para cambiar la configuración.</p>
  </div>
  ${cos.length===0
    ?`<div class="card" style="text-align:center;padding:56px 24px">
        <div style="font-size:48px;margin-bottom:12px">🏢</div>
        <h3 style="color:var(--nv);font-size:20px;margin-bottom:8px">Sin empresas todavía</h3>
        <p class="hint">Crea la primera empresa con el botón de arriba</p>
      </div>`
    :`<div style="overflow-x:auto"><table>
      <thead><tr>
        <th>Empresa / Evento</th><th>URL del evento</th><th>Estado</th>
        <th style="text-align:center">Cartillas</th><th>Fecha evento</th><th>Cierre</th><th>Acciones</th>
      </tr></thead>
      <tbody>${cos.map(co=>{
        const used=co.counter||0;
        const pct=Math.min(100,Math.round(used/co.maxTotal*100));
        const exp=expired(co);
        return`<tr>
          <td>
            <span class="name-link btn-ro" data-id="${co.id}">${esc(co.name)}</span>
          </td>
          <td><code style="background:var(--bg1);padding:2px 6px;border-radius:4px;font-size:11px">evento/${esc(co.slug)}</code></td>
          <td>
            <span class="badge ${co.isActive?'ok':'no'}">${co.isActive?'🟢 Activo':'⏸️ Pausado'}</span>
            ${exp?'<span class="badge no" style="margin-left:4px">⏱️ Vencido</span>':''}
          </td>
          <td style="text-align:center;min-width:100px">
            <div style="font-size:11px;color:var(--tx2);margin-bottom:3px">${used} / ${co.maxTotal}</div>
            <div class="prog-wrap"><div class="prog-bar" style="width:${pct}%"></div></div>
          </td>
          <td style="font-size:12px;color:var(--tx1)">${co.eventDate?fmt(co.eventDate):'—'}</td>
          <td style="font-size:12px;color:${exp?'var(--no-tx)':'var(--tx1)'}">${co.deadline?fmt(co.deadline):'—'}</td>
          <td>
            <div class="flex gap4">
              <button class="btn sm btn-edit" data-id="${co.id}">✏️ Editar</button>
              <button class="btn sm btn-url" data-slug="${esc(co.slug)}">🔗 URL</button>
              <button class="btn sm danger btn-del" data-id="${co.id}" data-name="${esc(co.name)}">✕</button>
            </div>
          </td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>`}
</div>`;

  // Nueva empresa
  el.querySelector('#btn-new').onclick=()=>{
    const form=el.querySelector('#new-form');
    form.innerHTML=`
<div class="card fi" style="border:1.5px solid var(--or);background:var(--or-lt)">
  <h4 style="color:var(--nv);font-size:17px;margin-bottom:14px">Nueva empresa / evento</h4>
  <div class="fld"><label class="lbl">Nombre del cliente o evento</label>
    <input id="new-name" class="inp" placeholder="Ej: Tottus – Bingo Navidad 2025"/>
    <p id="new-err" class="err-msg" style="display:none"></p></div>
  <div class="flex gap8">
    <button id="new-ok" class="btn p">Crear empresa</button>
    <button id="new-cancel" class="btn ghost">Cancelar</button>
  </div>
</div>`;
    const inp=form.querySelector('#new-name'),err=form.querySelector('#new-err');
    inp.focus();
    form.querySelector('#new-ok').onclick=async()=>{
      const name=inp.value.trim();
      if(!name){err.textContent='Ingresa un nombre';err.style.display='block';inp.focus();return;}
      const cos=await getCos().catch(()=>[]);
      if(cos.some(c=>c.slug===slugify(name))){err.textContent='Ya existe una empresa con ese nombre';err.style.display='block';return;}
      const btn=form.querySelector('#new-ok');btn.disabled=true;btn.textContent='Guardando...';
      const co=mkCo(name);
      try{await saveCo(co);}catch(e){alert('Error al guardar: '+e.message);btn.disabled=false;btn.textContent='Crear empresa';return;}
      S.editingCo=co.id;S.aView='detail';S.aTab='cfg';reRender();
    };
    form.querySelector('#new-cancel').onclick=()=>{form.innerHTML='';};
    inp.onkeydown=e=>{if(e.key==='Enter')form.querySelector('#new-ok').click();if(e.key==='Escape')form.querySelector('#new-cancel').click();};
  };

  // Click nombre → solo lectura
  el.querySelectorAll('.btn-ro').forEach(b=>b.onclick=()=>{S.roId=b.dataset.id;S.aView='readonly';reRender();});

  // Editar → acceso completo
  el.querySelectorAll('.btn-edit').forEach(b=>b.onclick=()=>{S.editingCo=b.dataset.id;S.aView='detail';S.aTab='cfg';reRender();});

  // Copiar URL
  el.querySelectorAll('.btn-url').forEach(b=>b.onclick=()=>{
    const url=location.origin+location.pathname+'#evento/'+b.dataset.slug;
    navigator.clipboard?.writeText(url).then(()=>alert('✅ URL copiada:\n\n'+url)).catch(()=>prompt('Copia esta URL:',url));
  });

  // Eliminar
  el.querySelectorAll('.btn-del').forEach(b=>b.onclick=()=>{
    if(!confirm('¿Eliminar "'+b.dataset.name+'" y todos sus registros? No se puede deshacer.'))return;
    try{localStorage.removeItem(rKey(b.dataset.id));}catch{}
    saveCos(getCos().filter(c=>c.id!==b.dataset.id));
    viewCoList(el,reRender);
  });
}

function viewReadOnly(el,co){

  const used=co.counter||0;

  <div class="card fi">
    <div class="flex ai-c gap16 wrap">
      ${co.brandLogo?`<img src="${co.brandLogo}" style="height:48px;object-fit:contain;border-radius:var(--r)"/>`
        :`<div style="width:48px;height:48px;border-radius:var(--r);background:${co.brandAccent||'var(--or)'};display:flex;align-items:center;justify-content:center;font-size:22px">🎱</div>`}
      <div style="flex:1">
        <h3 style="color:var(--nv);font-size:20px">${esc(co.name)}</h3>

          <span class="badge ${co.isActive?'ok':'no'}">${co.isActive?'🟢 Activo':'⏸️ Pausado'}</span>

      ?`<div style="padding:48px;text-align:center"><div style="font-size:44px;margin-bottom:8px">📭</div><p class="hint">Sin registros todavía</p></div>`
      :`<div style="overflow-x:auto"><table>

            <th>#</th><th>Código(s)</th><th>Apellidos y nombre</th><th>DNI</th>
            <th style="text-align:center">Cant.</th><th>Números B·I·N·G·O</th><th>Registro</th><th></th>
          </tr></thead>
          <tbody>${(function(){var _d=findDupes(regs);return regs.map(function(r,idx){var isDup=_d.has(idx);return `
          <tr style="${isDup?'background:#fffbea;':''}">
            <td style="font-size:11px;color:var(--tx2)">${idx+1}${isDup?'<span style="color:#b8860b;font-weight:800;margin-left:3px" title="Nombre duplicado">&#9888;</span>':''}</td>

            </td>
            <td style="font-size:11px;color:var(--tx2);white-space:nowrap">${fmt(r.ts)}</td>
            <td><button class="btn sm p ro-dl-one" data-idx="${idx}">⬇️</button></td>
          </tr>`;}).join('');})()}</tbody>
        </table></div>`}
  </div>
</div>`;

  el.querySelector('#ro-csv').onclick=()=>exportCSV(co,regs);
  el.querySelector('#ro-dlall').onclick=async function(){
    if(!regs.length){alert('No hay cartillas.');return;}
    const orig=this.innerHTML;this.disabled=true;this.textContent='Generando...';
    const items=[];
    for(const r of regs){for(let i=0;i<(r.cards||[]).length;i++){
      const img=await renderCard(co,r.cards[i],r.codes[i],r.apellidos+' '+r.nombre);
      if(img)items.push({dataUrl:img,filename:'bingo-'+r.codes[i]});
    }}
    await dlAll(items,'cartillas-'+slugify(co.name));
    this.disabled=false;this.innerHTML=orig;
  };
  el.querySelectorAll('.ro-dl-one').forEach(b=>b.onclick=async function(){
    const r=regs[Number(this.dataset.idx)];const orig=this.innerHTML;this.disabled=true;this.textContent='...';
    const items=[];
    for(let i=0;i<(r.cards||[]).length;i++){
      const img=await renderCard(co,r.cards[i],r.codes[i],r.apellidos+' '+r.nombre);
      if(img)items.push({dataUrl:img,filename:'bingo-'+r.codes[i]});
    }
    await dlAll(items,'bingo-'+r.codes[0]);
    this.disabled=false;this.innerHTML=orig;
  });
}

function exportCSV(co,regs){
  if(!regs.length){alert('No hay registros.');return;}
  const rows=[['N°','Código(s)','Apellidos','Nombre','DNI','Cant. cartillas','Números B','Números I','Números N','Números G','Números O','Fecha registro']];
  regs.forEach((r,i)=>{(r.cards||[]).forEach((card,ci)=>{
    rows.push([i+1,(r.codes||[])[ci]||'',r.apellidos,r.nombre,r.dni,
      (r.codes||[]).length,card.B.join(','),card.I.join(','),
      card.N.map(n=>n===null?'FREE':n).join(','),card.G.join(','),card.O.join(','),r.ts]);
  });});
  const csv=rows.map(row=>row.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='cartillas-'+slugify(co.name)+'.csv';a.click();
}

// ── Tab Calibración ────────────────────────────────────────────────────────────
function tCal(el,co){
  const SL=[
    {k:'gridLeft',lbl:'Margen izquierdo de la cuadrícula',min:0,max:40,step:.1},
    {k:'gridTop',lbl:'Posición superior de la cuadrícula',min:30,max:85,step:.1},
    {k:'cellW',lbl:'Ancho de cada celda',min:5,max:30,step:.1},
    {k:'cellH',lbl:'Alto de cada celda',min:3,max:25,step:.1},
    {k:'numFontPct',lbl:'Tamaño fuente números',min:.5,max:8,step:.1},
    {k:'ovalX',lbl:'Posición horizontal del óvalo',min:10,max:90,step:.1},
    {k:'ovalY',lbl:'Posición vertical del óvalo',min:5,max:65,step:.1},
    {k:'ovalFontPct',lbl:'Tamaño fuente código',min:.5,max:5,step:.1},
  ];
  const mkS=s=>`<div class="fld"><div class="flex jb ai-c" style="margin-bottom:4px">
    <label class="lbl" style="margin:0;font-size:10px">${s.lbl}</label>
    <span id="lv-${s.k}" style="font-weight:800;color:var(--or);font-size:12px;min-width:38px;text-align:right">${Number(co[s.k]).toFixed(1)}</span></div>
    <input type="range" data-k="${s.k}" min="${s.min}" max="${s.max}" step="${s.step}" value="${co[s.k]}"/></div>`;
  el.innerHTML=`
<div style="display:grid;grid-template-columns:300px 1fr;gap:1rem;align-items:start">
  <div>
    <div class="card fi mb12">
      <div class="flex jb ai-c mb12"><h4 style="color:var(--nv);font-size:16px">Números</h4>
        <button id="cal-rst" class="btn sm ghost danger">↺ Reset</button></div>
      ${SL.slice(0,5).map(mkS).join('')}
      <div class="fld"><label class="lbl">Color números</label>
        <div class="flex ai-c gap8"><input type="color" data-k="numColor" value="${co.numColor}"/>
          <span id="nc-lbl" class="hint">${co.numColor}</span></div></div>
    </div>
    <div class="card fi">
      <h4 style="color:var(--nv);font-size:16px;margin-bottom:12px">Óvalo del código</h4>
      ${SL.slice(5).map(mkS).join('')}
      <div class="fld"><label class="lbl">Color texto código</label>
        <div class="flex ai-c gap8"><input type="color" data-k="ovalColor" value="${co.ovalColor}"/>
          <span id="oc-lbl" class="hint">${co.ovalColor}</span></div></div>
    </div>
  </div>
  <div class="card fi" style="position:sticky;top:16px">
    <div class="flex jb ai-c mb12"><h4 style="color:var(--nv);font-size:16px">Vista en vivo</h4>
      <span class="hint">Ajusta y verifica</span></div>
    ${co.template?`<canvas id="gcv" style="width:100%;border-radius:var(--r);border:0.5px solid var(--bd);display:block"></canvas>`
      :`<div style="padding:60px 20px;text-align:center;color:var(--tx2)"><div style="font-size:36px;margin-bottom:8px">🖼️</div>Sube una plantilla en Config para calibrar</div>`}
  </div>
</div>`;
  const drawOv=()=>{
    const cv=el.querySelector('#gcv');if(!cv||!co.template)return;
    const img=new Image();img.onload=()=>{
      const mW=cv.parentElement.clientWidth-42,sc=mW/img.width;
      cv.width=mW;cv.height=Math.round(img.height*sc);
      const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
      ctx.drawImage(img,0,0,W,H);
      const GL=W*co.gridLeft/100,GT=H*co.gridTop/100,CW=W*co.cellW/100,CH=H*co.cellH/100;
      ctx.fillStyle='rgba(255,107,53,.18)';ctx.strokeStyle='rgba(255,107,53,.88)';ctx.lineWidth=1.5;
      for(let r=0;r<5;r++)for(let c=0;c<5;c++){ctx.fillRect(GL+c*CW,GT+r*CH,CW,CH);ctx.strokeRect(GL+c*CW,GT+r*CH,CW,CH);}
      const lfs=Math.round(CW*.28);ctx.font='bold '+lfs+'px Arial';ctx.fillStyle='rgba(255,107,53,.95)';ctx.textAlign='center';ctx.textBaseline='middle';
      COLS.forEach((l,i)=>ctx.fillText(l,GL+i*CW+CW/2,GT-CH*.38));
      const ox=W*co.ovalX/100,oy=H*co.ovalY/100;
      ctx.strokeStyle='rgba(255,107,53,.9)';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
      ctx.strokeRect(ox-W*.18,oy-H*.025,W*.36,H*.05);ctx.setLineDash([]);
      ctx.fillStyle='rgba(255,107,53,.9)';ctx.font='bold '+Math.round(lfs*.52)+'px Arial';
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('00001  ·  APELLIDOS Nombre',ox,oy);
    };img.src=co.template;
  };
  el.querySelectorAll('input[type=range]').forEach(inp=>inp.oninput=()=>{
    co[inp.dataset.k]=Number(inp.value);
    const lv=el.querySelector('#lv-'+inp.dataset.k);if(lv)lv.textContent=Number(inp.value).toFixed(1);
    drawOv();clearTimeout(inp._t);inp._t=setTimeout(()=>saveCo(co),800);
  });
  el.querySelectorAll('input[type=color]').forEach(inp=>inp.oninput=()=>{
    co[inp.dataset.k]=inp.value;
    const lbl=el.querySelector('#'+(inp.dataset.k==='numColor'?'nc':'oc')+'-lbl');if(lbl)lbl.textContent=inp.value;
    drawOv();clearTimeout(inp._t);inp._t=setTimeout(()=>saveCo(co),800);
  });
  el.querySelector('#cal-rst').onclick=async()=>{if(!confirm('¿Restaurar calibración por defecto?'))return;Object.assign(co,GDFL);await saveCo(co);tCal(el,co);};

// ── Tab Registros ─────────────────────────────────────────────────────────────
function tRegs(el,co){
  const regs=getRegs(co.id);
  const used=co.counter||0;
  el.innerHTML=`
<div style="display:grid;gap:1rem">
  <div class="card fi">
    <div class="flex ai-c jb mb12 wrap gap8">
      <h3 style="color:var(--nv);font-size:19px">Registro de cartillas — ${esc(co.name)}</h3>
      <div class="flex gap8 wrap">
        <button id="btn-csv" class="btn sm">⬇️ Exportar CSV</button>
        <button id="btn-dlall" class="btn sm p">⬇️ Descargar todas</button>
        ${regs.length?`<button id="btn-clr" class="btn sm danger">🗑️ Borrar registros</button>`:''}
      </div>
    </div>
    ${dupeBanner(regs)}
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px">
      ${[['👥','Participantes',regs.length],['🎱','Cartillas emitidas',used],
         ['📊','Capacidad usada',Math.min(100,Math.round(used/co.maxTotal*100))+'%'],
         ['🎟️','Disponibles',Math.max(0,co.maxTotal-used)]
      ].map(([ico,lbl,val])=>`
      <div style="background:var(--bg1);border-radius:var(--r);padding:12px;text-align:center;border:0.5px solid var(--bd)">
        <div style="font-size:20px;margin-bottom:4px">${ico}</div>
        <div style="font-weight:800;font-size:20px;color:var(--nv)">${val}</div>
        <div style="font-size:11px;color:var(--tx2)">${lbl}</div>
      </div>`).join('')}
    </div>
    <div class="prog-wrap mb16"><div class="prog-bar" style="width:${Math.min(100,Math.round(used/co.maxTotal*100))}%"></div></div>
    ${regs.length===0
      ?`<div style="padding:48px;text-align:center"><div style="font-size:44px;margin-bottom:8px">📭</div><p class="hint">Sin participantes registrados</p></div>`
      :`<div style="overflow-x:auto"><table>
          <thead><tr><th>#</th><th>Código(s)</th><th>Apellidos y nombre</th><th>DNI</th>
            <th style="text-align:center">Cant.</th><th>Números B·I·N·G·O</th><th>Registro</th><th></th>
          </tr></thead>
          <tbody>${(function(){var _d=findDupes(regs);return regs.map(function(r,idx){var isDup=_d.has(idx);return `
          <tr style="${isDup?'background:#fffbea;':''}">
            <td style="font-size:11px;color:var(--tx2)">${idx+1}${isDup?'<span style="color:#b8860b;font-weight:800;margin-left:3px" title="Nombre duplicado">&#9888;</span>':''}</td>
            <td>${(r.codes||[]).map(c=>`<code style="background:var(--or-lt);color:var(--ork);padding:2px 6px;border-radius:4px;font-size:12px;font-weight:800;display:inline-block;margin:1px">${esc(c)}</code>`).join('')}</td>
            <td><div style="font-weight:800">${esc(r.apellidos)}</div><div style="font-size:12px;color:var(--tx1)">${esc(r.nombre)}</div></td>
            <td style="font-family:monospace;font-size:12px">${esc(r.dni)}</td>
            <td style="text-align:center;font-weight:800;color:var(--or)">${(r.codes||[]).length}</td>
            <td style="font-size:11px;color:var(--tx2);max-width:220px">
              ${(r.cards||[]).map((card,ci)=>`<div style="margin-bottom:2px"><span style="font-weight:700">#${ci+1}:</span> ${cardNums(card)}</div>`).join('')}
            </td>
            <td style="font-size:11px;color:var(--tx2);white-space:nowrap">${fmt(r.ts)}</td>
            <td><button class="btn sm p btn-dl-one" data-idx="${idx}">⬇️</button></td>
          </tr>`;}).join('');})()}</tbody>
        </table></div>`}
  </div>
</div>`;
  el.querySelector('#btn-csv').onclick=()=>exportCSV(co,regs);
  el.querySelector('#btn-dlall').onclick=async function(){
    if(!regs.length){alert('No hay cartillas.');return;}
    const orig=this.innerHTML;this.disabled=true;this.textContent='Generando...';
    const items=[];
    for(const r of regs){for(let i=0;i<(r.cards||[]).length;i++){
      const img=await renderCard(co,r.cards[i],r.codes[i],r.apellidos+' '+r.nombre);
      if(img)items.push({dataUrl:img,filename:'bingo-'+r.codes[i]});
    }}
    await dlAll(items,'cartillas-'+slugify(co.name));
    this.disabled=false;this.innerHTML=orig;
  };
  const clr=el.querySelector('#btn-clr');
  if(clr)clr.onclick=async()=>{
    if(!confirm('¿Borrar todos los registros? No se puede deshacer.'))return;
    clr.textContent='Borrando...';clr.disabled=true;
    await deleteRegs(co.id);
    tRegs(el,co,[]);
  };
  el.querySelectorAll('.btn-dl-one').forEach(b=>b.onclick=async function(){
    const r=regs[Number(this.dataset.idx)];const orig=this.innerHTML;this.disabled=true;this.textContent='...';
    const items=[];
    for(let i=0;i<(r.cards||[]).length;i++){
      const img=await renderCard(co,r.cards[i],r.codes[i],r.apellidos+' '+r.nombre);
      if(img)items.push({dataUrl:img,filename:'bingo-'+r.codes[i]});
    }
    await dlAll(items,'bingo-'+r.codes[0]);
    this.disabled=false;this.innerHTML=orig;
  });
}

  const bind=(id,key)=>{const inp=root.querySelector('#'+id);if(!inp)return;inp.oninput=e=>{S.pForm[key]=e.target.value;delete S.pErr[key];};inp.onkeydown=e=>{if(e.key==='Enter')submit();};};
  bind('f-ap','apellidos');bind('f-nb','nombre');bind('f-dn','dni');
  root.querySelector('#f-sub').onclick=submit;
  setTimeout(()=>root.querySelector('#f-ap')?.focus(),80);

  async function submit(){
    const f=S.pForm;const errs={};
    if(!f.apellidos.trim())errs.apellidos='Ingresa tus apellidos completos';
    if(!f.nombre.trim())errs.nombre='Ingresa tu nombre';
    if(!/^\d{8}$/.test(f.dni.trim()))errs.dni='El DNI debe tener exactamente 8 dígitos';
    else if(getRegs(co.id).some(r=>r.dni===f.dni.trim()))errs.dni='Este DNI ya fue registrado para este evento';

    if(Object.keys(errs).length){S.pErr=errs;viewParticipant(root);return;}
    if(usedCards(co.id)>=co.maxTotal){S.pErr={dni:'Capacidad máxima alcanzada'};viewParticipant(root);return;}
    S.pLoading=true;S.pErr={};viewParticipant(root);
    try{
      // Refresh co and check DNI + capacity from Firebase
      const coFresh=(await getCos()).find(c=>c.id===co.id)||co;
      const existingRegs=await getRegs(co.id);
      if(existingRegs.some(r=>r.dni===f.dni.trim())){
        S.pErr={dni:'Este DNI ya fue registrado para este evento'};S.pLoading=false;viewParticipant(root);return;
      }
      const usedNow=usedCards(existingRegs);
      if(usedNow>=coFresh.maxTotal){
        S.pErr={dni:'Capacidad máxima alcanzada'};S.pLoading=false;viewParticipant(root);return;
      }
      const cards=[],codes=[],imgs=[];
      const fullName=f.apellidos.trim().toUpperCase()+' '+f.nombre.trim();
      for(let i=0;i<coFresh.maxPer;i++){
        if(usedNow+i>=coFresh.maxTotal)break;
        const card=genCard();
        const code=await nextCode(coFresh.id);
        const img=await renderCard(coFresh,card,code,fullName);
        cards.push(card);codes.push(code);imgs.push(img);
      }
      const reg={apellidos:f.apellidos.trim(),nombre:f.nombre.trim(),dni:f.dni.trim(),codes,cards,ts:new Date().toISOString()};
      await addReg(co.id,reg);
      S.pResult={codes,cards,imgs,nombre:f.nombre.trim(),apellidos:f.apellidos.trim()};
      S.pCo=coFresh;S.pLoading=false;viewDone(root);
    }catch(e){
      S.pLoading=false;
      showError(root,'Error al registrar: '+e.message,co.brandBg||'#1E2D6B',co.brandAccent||'#F5A623');
    }
  }
}
